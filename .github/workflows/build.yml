name: Build And Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Typecheck frontend
        run: npm run typecheck
        working-directory: frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

      - name: Build frontend
        run: VITE_GIT_COMMIT_HASH=${GITHUB_SHA} npm run build
        working-directory: frontend

      - name: Build backend
        run: chmod +x ./gradlew && ./gradlew build
        working-directory: backend

      - name: Prepare deployment script
        run: chmod +x scripts/deploy-artifacts.sh

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: |
            backend/build/distributions
            backend/build/libs
          if-no-files-found: error

      - name: Upload deployment script artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-script
          path: scripts/deploy-artifacts.sh
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build

    env:
      DEPLOY_HOST: studue.ch
      DEPLOY_PORT: '22'
      DEPLOY_USER: studue
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
      REMOTE_DEPLOY_DIR: /tmp/studue-deploy-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: deploy-workdir/frontend-dist

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: deploy-workdir/backend-build

      - name: Download deployment script artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-script
          path: deploy-workdir/deploy-script

      - name: Configure SSH access
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Prepare remote staging directory
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$DEPLOY_PORT" -o IdentitiesOnly=yes "$DEPLOY_USER@$DEPLOY_HOST" \
            "rm -rf '$REMOTE_DEPLOY_DIR' && mkdir -p '$REMOTE_DEPLOY_DIR'"

      - name: Copy deployment artifacts to server
        run: |
          scp -i ~/.ssh/id_ed25519 -P "$DEPLOY_PORT" -o IdentitiesOnly=yes -r \
            deploy-workdir/frontend-dist \
            deploy-workdir/backend-build \
            deploy-workdir/deploy-script \
            "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_DEPLOY_DIR/"

      - name: Run remote deployment
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$DEPLOY_PORT" -o IdentitiesOnly=yes "$DEPLOY_USER@$DEPLOY_HOST" \
            "sudo /usr/local/bin/studue-deploy.sh '$REMOTE_DEPLOY_DIR'"
